<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sea Breeze POS Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #d8ecf8;
      --surface: #ffffff;
      --surface2: rgba(255,255,255,0.6);
      --teal: #297288;
      --teal-light: rgba(41, 114, 136, 0.1);
      --teal-mid: rgba(41, 114, 136, 0.2);
      --border: rgba(41, 114, 136, 0.15);
      --success: #188038;
      --success-bg: rgba(24, 128, 56, 0.1);
      --danger: #d93025;
      --danger-bg: rgba(217, 48, 37, 0.1);
      --text: #1a1a1a;
      --text-muted: #666666;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Wave background */
    body::after {
      content: '';
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 35vh;
      background: linear-gradient(to top right, #91cce6, transparent);
      border-top-right-radius: 60%;
      border-top-left-radius: 10%;
      z-index: -1;
      opacity: 0.5;
      pointer-events: none;
    }

    /* Header */
    header {
      width: 100%;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo-block { text-align: left; }
    .logo-main {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: 1px;
    }
    .logo-sub {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--teal);
      opacity: 0.7;
    }

    .status-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: 20px;
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(24,128,56,0.2);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Main content */
    main {
      width: 100%; max-width: 440px;
      padding: 24px 16px 80px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .card {
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.04);
    }

    label {
      font-size: 11px;
      font-weight: 700;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 10px;
    }

    select, input[type="number"], input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }
    select:focus, input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px var(--teal-mid);
    }
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      color: var(--teal); pointer-events: none;
    }

    /* Amount chips */
    .amount-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    .amount-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--teal);
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600;
      padding: 10px 0;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .amount-chip:hover, .amount-chip.active {
      background: var(--teal);
      border-color: var(--teal);
      color: white;
      box-shadow: 0 4px 12px rgba(41, 114, 136, 0.25);
    }

    /* NFC Zone */
    .nfc-zone {
      display: flex; flex-direction: column; align-items: center;
      gap: 18px; padding: 32px 20px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .nfc-ring {
      position: relative;
      width: 130px; height: 130px;
      display: flex; align-items: center; justify-content: center;
    }
    .nfc-ring::before, .nfc-ring::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      border: 2px solid var(--teal);
      opacity: 0;
      animation: ripple 2.5s ease-out infinite;
    }
    .nfc-ring::before { width: 100%; height: 100%; animation-delay: 0s; }
    .nfc-ring::after  { width: 75%;  height: 75%;  animation-delay: 0.4s; }
    @keyframes ripple {
      0%   { opacity: 0.5; transform: scale(0.7); }
      100% { opacity: 0;   transform: scale(1.4); }
    }
    .nfc-circle {
      width: 90px; height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal-light), var(--teal-mid));
      border: 2px solid var(--teal);
      box-shadow: 0 0 24px var(--teal-mid);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      transition: transform 0.15s;
    }
    .nfc-zone:active .nfc-circle { transform: scale(0.93); }
    .nfc-zone.scanning .nfc-circle {
      animation: scanPulse 0.8s ease-in-out infinite alternate;
    }
    @keyframes scanPulse {
      from { box-shadow: 0 0 16px var(--teal-mid); }
      to   { box-shadow: 0 0 40px rgba(41, 114, 136, 0.5); }
    }
    .nfc-label {
      font-size: 15px; font-weight: 600;
      color: var(--text);
      text-align: center;
      font-family: 'Playfair Display', serif;
    }
    .nfc-sub {
      font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.5;
    }
    .nfc-uid-badge {
      background: var(--teal-light);
      border: 1px solid var(--teal);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px; font-weight: 600;
      color: var(--teal);
      letter-spacing: 1px;
      font-family: 'Courier New', monospace;
      display: none;
    }

    .manual-toggle {
      text-align: center; font-size: 12px; color: var(--teal);
      cursor: pointer; text-decoration: underline;
      margin-top: 4px;
    }
    .manual-section { display: none; margin-top: 12px; }
    .manual-section.open { display: block; }

    /* Pay Button */
    #payBtn {
      width: 100%;
      padding: 18px;
      border-radius: 12px;
      border: none;
      background: var(--teal);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 16px; font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 24px rgba(41, 114, 136, 0.3);
    }
    #payBtn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(41, 114, 136, 0.4); }
    #payBtn:active { transform: translateY(0); }
    #payBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Result Overlay */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(216, 236, 248, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn 0.2s ease;
    }
    .overlay.open { display: flex; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .result-card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 340px; width: 90%;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }

    .result-icon {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 20px;
    }
    .result-icon.success { background: var(--success-bg); border: 2px solid var(--success); }
    .result-icon.error   { background: var(--danger-bg);  border: 2px solid var(--danger); }

    .result-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700;
      margin-bottom: 8px;
    }
    .result-amount { font-size: 36px; font-weight: 800; color: var(--success); margin: 12px 0; }
    .result-amount.fail { color: var(--danger); }
    .result-detail { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .result-balance {
      margin-top: 16px; padding: 12px 16px;
      background: var(--teal-light); border-radius: 10px;
      font-size: 13px; color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .result-balance span { color: var(--teal); font-weight: 700; font-size: 15px; }

    .close-btn {
      margin-top: 24px;
      width: 100%; padding: 14px;
      border-radius: 10px; border: 1px solid var(--border);
      background: var(--teal-light);
      color: var(--teal); font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .close-btn:hover { background: var(--teal-mid); }

    /* Recent Transactions */
    .tx-list { display: flex; flex-direction: column; gap: 8px; }
    .tx-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255,255,255,0.7);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .tx-left { display: flex; align-items: center; gap: 10px; }
    .tx-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
    .tx-dot.fail { background: var(--danger); }
    .tx-info { font-size: 13px; }
    .tx-uid { font-weight: 600; font-family: monospace; color: var(--teal); }
    .tx-vendor { font-size: 11px; color: var(--text-muted); }
    .tx-amount { font-weight: 700; font-size: 14px; color: var(--success); }
    .tx-amount.fail { color: var(--danger); }
    .empty-tx { text-align: center; color: var(--text-muted); font-size: 13px; padding: 16px 0; }
  </style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo-main">SEA BREEZE</div>
    <div class="logo-sub">POS Terminal</div>
  </div>
  <div class="status-badge">
    <div class="status-dot"></div>
    Online
  </div>
</header>

<main>

  <!-- Vendor -->
  <div class="card">
    <label>Vendor / Stall</label>
    <div class="select-wrap">
      <select id="vendorSelect">
        <option value="">Loading vendors…</option>
      </select>
    </div>
  </div>

  <!-- Amount -->
  <div class="card">
    <label>Amount (AZN)</label>
    <input type="number" id="amountInput" placeholder="0.00" min="0.5" step="0.5" />
    <div class="amount-grid" id="chipGrid">
      <button class="amount-chip" data-val="2">2 ₼</button>
      <button class="amount-chip" data-val="5">5 ₼</button>
      <button class="amount-chip" data-val="10">10 ₼</button>
      <button class="amount-chip" data-val="15">15 ₼</button>
      <button class="amount-chip" data-val="20">20 ₼</button>
      <button class="amount-chip" data-val="50">50 ₼</button>
    </div>
  </div>

  <!-- NFC Tap Zone -->
  <div class="card" style="padding:0; overflow:hidden;">
    <div class="nfc-zone" id="nfcZone">
      <div class="nfc-ring">
        <div class="nfc-circle">📶</div>
      </div>
      <div>
        <div class="nfc-label" id="nfcLabel">Tap Wristband Here</div>
        <div class="nfc-sub" id="nfcSub">Hold NFC wristband close to the back of your phone</div>
      </div>
      <div class="nfc-uid-badge" id="uidBadge"></div>
    </div>
    <div style="padding: 0 20px 16px; text-align:center;">
      <span class="manual-toggle" id="manualToggle">Enter UID manually instead</span>
      <div class="manual-section" id="manualSection">
        <input type="text" id="manualUid" placeholder="e.g. A1-B2-C3-D4" style="margin-top:8px;" />
      </div>
    </div>
  </div>

  <!-- Pay Button -->
  <button id="payBtn">⚡ Process Payment</button>

  <!-- Recent Transactions -->
  <div class="card">
    <label style="margin-bottom:12px;">Recent Transactions</label>
    <div class="tx-list" id="txList">
      <div class="empty-tx">Tap a wristband to start</div>
    </div>
  </div>

</main>

<!-- Result Overlay -->
<div class="overlay" id="overlay">
  <div class="result-card" id="resultCard">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-amount" id="resultAmount"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="result-balance" id="resultBalance" style="display:none;">
      Remaining balance: <span id="remainingBal"></span> AZN
    </div>
    <button class="close-btn" id="closeBtn">Done</button>
  </div>
</div>

<script>
  const API = window.location.origin;
  let currentUid = null;
  let nfcReader  = null;
  let vendors    = [];

  async function loadVendors() {
    try {
      const vRes = await fetch(`${API}/vendors`);
      if (vRes.ok) {
        vendors = await vRes.json();
        const sel = document.getElementById('vendorSelect');
        sel.innerHTML = vendors.map(v =>
          `<option value="${v.id}">${v.name}</option>`
        ).join('');
      } else {
        document.getElementById('vendorSelect').innerHTML =
          `<option value="1">Hovuz Bari (default)</option>`;
      }
    } catch(e) {
      document.getElementById('vendorSelect').innerHTML =
        `<option value="1">Hovuz Bari (default)</option>`;
    }
  }

  document.getElementById('chipGrid').addEventListener('click', e => {
    const chip = e.target.closest('.amount-chip');
    if (!chip) return;
    document.querySelectorAll('.amount-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    document.getElementById('amountInput').value = chip.dataset.val;
  });

  document.getElementById('manualToggle').addEventListener('click', () => {
    document.getElementById('manualSection').classList.toggle('open');
  });
  document.getElementById('manualUid').addEventListener('input', e => {
    const uid = e.target.value.trim().toLowerCase();
    setUid(uid || null);
  });

  const nfcZone  = document.getElementById('nfcZone');
  const nfcLabel = document.getElementById('nfcLabel');
  const nfcSub   = document.getElementById('nfcSub');
  const uidBadge = document.getElementById('uidBadge');

  function setUid(uid) {
    currentUid = uid;
    if (uid) {
      uidBadge.textContent = uid;
      uidBadge.style.display = 'block';
      nfcLabel.textContent = 'Wristband Detected ✓';
      nfcSub.textContent = 'Ready to process payment';
    } else {
      uidBadge.style.display = 'none';
      nfcLabel.textContent = 'Tap Wristband Here';
      nfcSub.textContent = 'Hold NFC wristband close to the back of your phone';
    }
  }

  async function startNFC() {
    if (!('NDEFReader' in window)) {
      document.getElementById('manualSection').classList.add('open');
      document.getElementById('manualToggle').textContent = '(NFC not available – use manual UID)';
      return;
    }
    try {
      nfcReader = new NDEFReader();
      await nfcReader.scan();
      nfcZone.classList.add('scanning');
      nfcLabel.textContent = 'Scanning… tap wristband';

      nfcReader.addEventListener('reading', ({ serialNumber }) => {
        const uid = serialNumber.toLowerCase();
        setUid(uid);
        nfcZone.classList.remove('scanning');
        if (navigator.vibrate) navigator.vibrate(80);
      });
    } catch(err) {
      console.warn('NFC error:', err);
      document.getElementById('manualSection').classList.add('open');
    }
  }

  nfcZone.addEventListener('click', startNFC);

  document.getElementById('payBtn').addEventListener('click', async () => {
    const uid      = currentUid || document.getElementById('manualUid').value.trim().toLowerCase();
    const amount   = parseFloat(document.getElementById('amountInput').value);
    const vendorId = parseInt(document.getElementById('vendorSelect').value);

    if (!uid)    return alert('Please tap a wristband or enter UID manually.');
    if (!amount || amount <= 0) return alert('Please enter a valid amount.');
    if (!vendorId) return alert('Please select a vendor.');

    const btn = document.getElementById('payBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Processing…';

    try {
      const res = await fetch(`${API}/pay`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nfc_uid: uid, vendor_id: vendorId, amount })
      });
      const data = await res.json();

      if (res.ok) {
        showResult('success', amount, uid, data.remaining_balance);
        addTxItem(uid, amount, vendorId, true);
        setUid(null);
      } else {
        showResult('error', amount, uid, null, data.detail || 'Payment failed');
        addTxItem(uid, amount, vendorId, false);
      }
    } catch(e) {
      showResult('error', amount, uid, null, 'Cannot reach server. Check your connection.');
    } finally {
      btn.disabled = false;
      btn.textContent = '⚡ Process Payment';
    }
  });

  function showResult(type, amount, uid, remaining, errorMsg) {
    const icon    = document.getElementById('resultIcon');
    const title   = document.getElementById('resultTitle');
    const amtEl   = document.getElementById('resultAmount');
    const detail  = document.getElementById('resultDetail');
    const balance = document.getElementById('resultBalance');
    const remBal  = document.getElementById('remainingBal');

    if (type === 'success') {
      icon.className = 'result-icon success';
      icon.textContent = '✓';
      title.textContent = 'Payment Approved!';
      amtEl.className = 'result-amount';
      amtEl.textContent = `${amount.toFixed(2)} AZN`;
      detail.textContent = `Charged to wristband ${uid}`;
      balance.style.display = 'block';
      remBal.textContent = remaining?.toFixed(2) ?? '—';
      if (navigator.vibrate) navigator.vibrate([80, 40, 80]);
    } else {
      icon.className = 'result-icon error';
      icon.textContent = '✕';
      title.textContent = 'Payment Declined';
      amtEl.className = 'result-amount fail';
      amtEl.textContent = `${amount.toFixed(2)} AZN`;
      detail.textContent = errorMsg || 'Transaction failed';
      balance.style.display = 'none';
      if (navigator.vibrate) navigator.vibrate(300);
    }
    document.getElementById('overlay').classList.add('open');
  }

  document.getElementById('closeBtn').addEventListener('click', () => {
    document.getElementById('overlay').classList.remove('open');
  });

  function addTxItem(uid, amount, vendorId, success) {
    const list = document.getElementById('txList');
    const emptyEl = list.querySelector('.empty-tx');
    if (emptyEl) emptyEl.remove();

    const vendorName = vendors.find(v => v.id === vendorId)?.name ?? `Vendor #${vendorId}`;
    const el = document.createElement('div');
    el.className = 'tx-item';
    el.innerHTML = `
      <div class="tx-left">
        <div class="tx-dot ${success ? '' : 'fail'}"></div>
        <div class="tx-info">
          <div class="tx-uid">${uid}</div>
          <div class="tx-vendor">${vendorName}</div>
        </div>
      </div>
      <div class="tx-amount ${success ? '' : 'fail'}">${success ? '-' : ''}${amount.toFixed(2)} ₼</div>`;
    list.prepend(el);
  }

  loadVendors();
</script>
</body>
</html>
